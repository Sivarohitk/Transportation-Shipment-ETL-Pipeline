app:
  env: dev

runtime:
  fail_fast: false

spark:
  profile: local
  app_name: transport-shipment-etl-dev
  enable_hive_support: true
  conf:
    spark.master: local[*]
    spark.sql.shuffle.partitions: "4"
    spark.ui.enabled: "false"

paths:
  raw_base_path: data/sample/raw
  staging_base_path: data/local/staging
  curated_base_path: data/local/curated
  audit_base_path: data/local/logs
  reference_base_path: data/sample/reference

logging:
  level: DEBUG
  json: false

io:
  invalid_records:
    windows_local_fallback_enabled: true
    windows_local_fallback_format: json
  curated_outputs:
    windows_local_fallback_enabled: true
    windows_local_fallback_format: json
